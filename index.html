<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <title>Radio Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding: 20px 20px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a2e, #0a0a0a);
            transition: background 1.8s ease;
            position: relative;
        }

        /* ===== SLIDER (Swiper) ===== */
        .slider-container {
            flex-shrink: 0;
            height: 90px;
            margin: 0 0 4px 0;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .slider-container .swiper {
            width: 100%;
            height: 100%;
        }

        .slider-container .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.08;
            transform: scale(0.4);
            filter: blur(5px);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            cursor: pointer;
            padding: 4px;
            border-radius: 12px;
            background: transparent;
        }

        .slider-container .swiper-slide img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            background: transparent;
        }

        .slider-container .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            background: transparent;
            padding: 4px;
            border-radius: 14px;
        }

        .slider-container .swiper-slide-active img {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .slider-container .swiper-slide-prev,
        .slider-container .swiper-slide-next {
            opacity: 0.12;
            transform: scale(0.5);
            filter: blur(4px);
        }

        .slider-container .swiper-slide-prev img,
        .slider-container .swiper-slide-next img {
            width: 50px;
            height: 50px;
        }

        .slider-container .swiper-slide:active {
            transform: scale(0.94);
            transition-duration: 0.05s;
        }

        /* ===== STATION NAME UNDER SLIDER ===== */
        .station-name-display {
            flex-shrink: 0;
            text-align: center;
            padding: 2px 0 8px 0;
            min-height: 28px;
        }

        .station-name-display .track {
            font-size: 15px;
            font-weight: 600;
            opacity: 0.85;
            letter-spacing: 0.3px;
        }

        .station-name-display .artist {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 1px;
            letter-spacing: 0.5px;
        }

        /* ===== VINYL ===== */
        .vinyl-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 0 0 4px 0;
        }

        .vinyl {
            width: 280px;
            height: 280px;
            max-width: 68vw;
            max-height: 68vw;
            position: relative;
            border-radius: 50%;
            background: transparent;
            box-shadow: none;
        }

        .vinyl::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(
                from 0deg,
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.10),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.04),
                rgba(255,255,255,0.01)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 2s ease;
            animation: glowPulse 5s ease-in-out infinite;
            animation-play-state: paused;
            filter: blur(3px);
        }

        .vinyl.glow::before {
            opacity: 1;
            animation-play-state: running;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; transform: scale(1); }
            25% { opacity: 0.8; transform: scale(1.015); }
            50% { opacity: 0.3; transform: scale(0.99); }
            75% { opacity: 0.6; transform: scale(1.008); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }

        .vinyl-disc svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14%;
            height: 14%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #666, #111 80%);
            border: 2px solid #222;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .vinyl-center::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: radial-gradient(circle, #888, #222);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .vinyl-shadow {
            position: absolute;
            top: -8%;
            left: -8%;
            width: 116%;
            height: 116%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(249,115,22,0.15) 0%, transparent 70%);
            opacity: 0;
            filter: blur(20px);
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 0;
        }

        .vinyl.glow .vinyl-shadow {
            opacity: 1;
        }

        /* ===== CONTROLS (увеличены на 10%) ===== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            flex-shrink: 0;
            padding: 8px 0 4px 0;
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            padding: 10px;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 1.3rem;
        }

        .btn:active {
            transform: scale(0.88);
            opacity: 0.5;
        }

        .btn-play {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            opacity: 1;
            padding: 0;
            font-size: 2.0rem;
        }

        .btn-play:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.92);
        }

        .btn-play.active {
            opacity: 1;
        }

        .btn-prev,
        .btn-next {
            font-size: 1.5rem;
        }

        /* ===== TRACK INFO (скрыто, используем station-name-display) ===== */
        .track-info {
            display: none;
        }

        .volume-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            display: flex;
            align-items: center;
            opacity: 0.2;
            transition: opacity 0.4s ease;
            padding: 12px 6px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .volume-container:active,
        .volume-container:focus-within {
            opacity: 0.6;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            transform: rotate(-90deg);
            transform-origin: center;
            position: absolute;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.15);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 420px) {
            #app { padding: 16px 16px 16px; }
            .slider-container { height: 72px; margin: 0; }
            .slider-container .swiper-slide img { width: 44px; height: 44px; }
            .slider-container .swiper-slide-active img { width: 60px; height: 60px; }
            .slider-container .swiper-slide-prev img,
            .slider-container .swiper-slide-next img { width: 36px; height: 36px; }
            .station-name-display .track { font-size: 13px; }
            .station-name-display .artist { font-size: 11px; }
            .vinyl { width: 220px; height: 220px; max-width: 60vw; max-height: 60vw; }
            .btn { width: 44px; height: 44px; padding: 6px; font-size: 1.1rem; }
            .btn-play { width: 66px; height: 66px; font-size: 1.6rem; }
            .btn-prev, .btn-next { font-size: 1.3rem; }
            .volume-container { right: 6px; height: 120px; opacity: 0.12; }
            .volume-slider { width: 80px; }
        }

        @media (max-width: 360px) {
            .slider-container { height: 60px; }
            .slider-container .swiper-slide img { width: 36px; height: 36px; }
            .slider-container .swiper-slide-active img { width: 50px; height: 50px; }
            .slider-container .swiper-slide-prev img,
            .slider-container .swiper-slide-next img { width: 30px; height: 30px; }
            .station-name-display .track { font-size: 12px; }
            .station-name-display .artist { font-size: 10px; }
            .vinyl { width: 160px; height: 160px; max-width: 50vw; max-height: 50vw; }
            .btn { width: 38px; height: 38px; font-size: 0.9rem; }
            .btn-play { width: 56px; height: 56px; font-size: 1.3rem; }
            .btn-prev, .btn-next { font-size: 1.1rem; }
        }

        @supports (padding: max(0px)) {
            #app {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Слайдер Swiper -->
        <section class="slider-container">
            <div class="swiper" id="stationSwiper">
                <div class="swiper-wrapper" id="sliderWrapper"></div>
            </div>
        </section>

        <!-- Название станции под каруселью -->
        <div class="station-name-display" id="stationNameDisplay">
            <div class="track" id="displayTrack">Groove Salad</div>
            <div class="artist" id="displayArtist">SomaFM · Chillout</div>
        </div>

        <!-- Винил -->
        <section class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-disc" id="vinylDisc">
                    <svg viewBox="0 0 120 120">
                        <defs>
                            <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#1a1a1a"/>
                                <stop offset="15%" stop-color="#0d0d0d"/>
                                <stop offset="30%" stop-color="#1a1a1a"/>
                                <stop offset="45%" stop-color="#0d0d0d"/>
                                <stop offset="60%" stop-color="#1a1a1a"/>
                                <stop offset="75%" stop-color="#0d0d0d"/>
                                <stop offset="90%" stop-color="#1a1a1a"/>
                                <stop offset="100%" stop-color="#0d0d0d"/>
                            </radialGradient>
                            <radialGradient id="shine1" cx="65%" cy="30%" r="35%">
                                <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
                                <stop offset="60%" stop-color="rgba(255,255,255,0.04)"/>
                                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                            </radialGradient>
                            <radialGradient id="shine2" cx="85%" cy="75%" r="25%">
                                <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
                                <stop offset="70%" stop-color="rgba(255,255,255,0.02)"/>
                                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                            </radialGradient>
                            <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#f97316"/>
                                <stop offset="100%" stop-color="#f97316" stop-opacity="0.7"/>
                            </radialGradient>
                        </defs>
                        <circle cx="60" cy="60" r="56" fill="url(#vinylGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="49" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                        <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="43" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                        <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="37" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                        <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="31" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                        <circle cx="60" cy="60" r="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="25" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                        <circle cx="60" cy="60" r="22" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                        <circle cx="60" cy="60" r="56" fill="url(#shine1)"/>
                        <circle cx="60" cy="60" r="56" fill="url(#shine2)"/>
                        <circle cx="60" cy="60" r="18" fill="url(#labelGrad)" opacity="0.9"/>
                        <circle cx="60" cy="60" r="14" fill="#0a0a0a" opacity="0.12"/>
                        <circle cx="60" cy="60" r="8" fill="#0a0a0a" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                        <circle cx="60" cy="60" r="4" fill="#0d0d0d"/>
                        <circle cx="60" cy="60" r="2" fill="#f97316" opacity="0.3"/>
                        <text x="60" y="53" font-size="5" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="700" letter-spacing="0.5">S</text>
                        <text x="60" y="63" font-size="3.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="300">FM</text>
                    </svg>
                </div>
                <div class="vinyl-shadow"></div>
                <div class="vinyl-center"></div>
            </div>
        </section>

        <!-- Управление -->
        <section class="controls">
            <button class="btn btn-prev" id="prevBtn" aria-label="Previous">
                <i class="fas fa-step-backward"></i>
            </button>
            <button class="btn btn-play" id="playBtn" aria-label="Play">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="btn btn-next" id="nextBtn" aria-label="Next">
                <i class="fas fa-step-forward"></i>
            </button>
        </section>

        <!-- Скрытый трек-инфо (для совместимости) -->
        <footer class="track-info">
            <div class="track-title loading" id="trackTitle">Connecting</div>
            <div class="track-artist" id="trackArtist">Radio</div>
        </footer>

        <!-- Громкость -->
        <div class="volume-container">
            <input type="range" class="volume-slider" id="volumeSlider" 
                   min="0" max="1" step="0.05" value="0.7">
        </div>

        <audio id="audioPlayer" preload="none"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        (function() {
            'use strict';

            const STATIONS = [
                { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout', img: 'https://somafm.com/logos/groovesalad-400.jpg' },
                { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient', img: 'https://somafm.com/logos/darkzone-400.jpg' },
                { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient', img: 'https://somafm.com/logos/defcon-400.jpg' },
                { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal', img: 'https://somafm.com/logos/metal-400.jpg' },
                { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground', img: 'https://somafm.com/logos/u80s-400.jpg' },
                { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics', img: 'https://somafm.com/logos/7soul-400.jpg' },
                { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage', img: 'https://somafm.com/logos/insound-400.jpg' },
                { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions', img: 'https://somafm.com/logos/covers-400.jpg' },
                { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio', img: 'https://somafm.com/logos/sf1033-400.jpg' },
                { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner', img: 'https://somafm.com/logos/scanner-400.jpg' },
                { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF', img: 'https://somafm.com/logos/sfinsf-400.jpg' },
                { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporwaves', station: 'SomaFM · Vaporwave', img: 'https://somafm.com/logos/vaporwaves-400.jpg' },
                { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal', img: 'https://somafm.com/logos/doomed-400.jpg' },
                { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House', img: 'https://somafm.com/logos/beatblender-400.jpg' },
                { value: 'https://ice1.somafm.com/bootliquor-128-mp3', track: 'Boot Liquor', station: 'SomaFM · Americana', img: 'https://somafm.com/logos/bootliquor-400.jpg' },
            ];

            const $ = (sel) => document.querySelector(sel);
            const app = $('#app');
            const vinyl = $('#vinyl');
            const vinylDisc = $('#vinylDisc');
            const playBtn = $('#playBtn');
            const playIcon = $('#playIcon');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const volumeSlider = $('#volumeSlider');
            const audio = $('#audioPlayer');
            const sliderWrapper = $('#sliderWrapper');
            const displayTrack = $('#displayTrack');
            const displayArtist = $('#displayArtist');

            let currentIndex = 0;
            let isPlaying = false;
            let swiper = null;
            let isSwitching = false;

            function buildSlider() {
                sliderWrapper.innerHTML = '';
                STATIONS.forEach((station, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.dataset.index = index;
                    
                    const img = document.createElement('img');
                    img.src = station.img;
                    img.alt = station.track;
                    img.loading = 'lazy';
                    
                    slide.appendChild(img);
                    sliderWrapper.appendChild(slide);
                });

                swiper = new Swiper('#stationSwiper', {
                    slidesPerView: 3,
                    centeredSlides: true,
                    loop: true,
                    speed: 500,
                    allowTouchMove: true,
                    watchSlidesProgress: true,
                    on: {
                        slideChange: function() {
                            const realIndex = this.realIndex;
                            if (realIndex !== currentIndex) {
                                switchToStation(realIndex);
                            }
                        }
                    }
                });

                document.querySelectorAll('.swiper-slide').forEach((slide) => {
                    slide.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        if (!isNaN(index) && swiper) {
                            swiper.slideToLoop(index);
                        }
                    });
                });
            }

            function updateBackground(index) {
                const colors = [
                    ['#3a1a3a', '#0a0a0a'], ['#1a0a1a', '#000000'],
                    ['#0a3a1a', '#0a0a0a'], ['#3a1a0a', '#0a0a0a'],
                    ['#2a1a3a', '#0a0a0a'], ['#1a2a3a', '#0a0a0a'],
                    ['#1a3a2a', '#0a0a0a'], ['#2a3a1a', '#0a0a0a'],
                    ['#1a1a1a', '#0a0a0a'], ['#0a0a2a', '#0a0a0a'],
                    ['#1a1a2a', '#0a0a0a'], ['#1a0a2a', '#0a0a0a'],
                    ['#2a0a0a', '#0a0a0a'], ['#2a0a3a', '#0a0a0a'],
                    ['#3a2a0a', '#0a0a0a'],
                ];
                const c = colors[index % colors.length];
                if (c) {
                    app.style.background = `radial-gradient(ellipse at 50% 30%, ${c[0]}, ${c[1]})`;
                }
            }

            function setVinylGlow(active) {
                vinyl.classList.toggle('glow', active);
            }

            function updateDisplay(index) {
                const station = STATIONS[index];
                if (station) {
                    displayTrack.textContent = station.track;
                    displayArtist.textContent = station.station;
                }
            }

            function switchToStation(index) {
                if (isSwitching) return;
                isSwitching = true;

                const station = STATIONS[index];
                if (!station) {
                    isSwitching = false;
                    return;
                }

                currentIndex = index;
                updateBackground(index);
                updateDisplay(index);

                audio.src = station.value;
                audio.load();

                if (isPlaying) {
                    audio.play()
                        .then(() => {
                            vinylDisc.style.animationPlayState = 'running';
                            setVinylGlow(true);
                            isSwitching = false;
                        })
                        .catch((e) => {
                            console.warn('Play error:', e.message);
                            isPlaying = false;
                            updatePlayButton(false);
                            vinylDisc.style.animationPlayState = 'paused';
                            setVinylGlow(false);
                            isSwitching = false;
                        });
                } else {
                    isSwitching = false;
                }
            }

            function togglePlay() {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                    setVinylGlow(false);
                } else {
                    const station = STATIONS[currentIndex];
                    if (!station) return;

                    if (audio.src && audio.src === station.value) {
                        audio.play()
                            .then(() => {
                                isPlaying = true;
                                updatePlayButton(true);
                                vinylDisc.style.animationPlayState = 'running';
                                setVinylGlow(true);
                            })
                            .catch((e) => {
                                console.warn('Play error:', e.message);
                            });
                    } else {
                        audio.src = station.value;
                        audio.load();
                        audio.play()
                            .then(() => {
                                isPlaying = true;
                                updatePlayButton(true);
                                vinylDisc.style.animationPlayState = 'running';
                                setVinylGlow(true);
                            })
                            .catch((e) => {
                                console.warn('Play error:', e.message);
                                isPlaying = false;
                                updatePlayButton(false);
                                vinylDisc.style.animationPlayState = 'paused';
                                setVinylGlow(false);
                            });
                    }
                }
            }

            function switchStation(direction) {
                if (!swiper) return;
                direction === 1 ? swiper.slideNext() : swiper.slidePrev();
            }

            function updatePlayButton(playing) {
                if (playing) {
                    playIcon.className = 'fas fa-pause';
                    playBtn.classList.add('active');
                } else {
                    playIcon.className = 'fas fa-play';
                    playBtn.classList.remove('active');
                }
            }

            function init() {
                buildSlider();
                updateBackground(0);
                updateDisplay(0);
                updatePlayButton(false);

                setTimeout(() => {
                    if (swiper) {
                        swiper.slideToLoop(0, 0);
                    }
                }, 100);

                playBtn.addEventListener('click', togglePlay);
                prevBtn.addEventListener('click', () => switchStation(-1));
                nextBtn.addEventListener('click', () => switchStation(1));

                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = parseFloat(e.target.value);
                });

                audio.addEventListener('error', () => {
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                    setVinylGlow(false);
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
