<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <title>Radio Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding: 20px 20px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a2e, #0a0a0a);
            transition: background 1.8s ease;
            position: relative;
        }

        /* ===== SLIDER (Swiper) ===== */
        .slider-container {
            flex-shrink: 0;
            height: 90px;
            margin: 25px 0 4px 0;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .slider-container .swiper {
            width: 100%;
            height: 100%;
        }

        .slider-container .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.08;
            transform: scale(0.4);
            filter: blur(5px);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            cursor: pointer;
            padding: 4px;
            border-radius: 12px;
            background: transparent;
        }

        .slider-container .swiper-slide img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            background: transparent;
        }

        .slider-container .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            background: transparent;
            padding: 4px;
            border-radius: 14px;
        }

        .slider-container .swiper-slide-active img {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .slider-container .swiper-slide-prev,
        .slider-container .swiper-slide-next {
            opacity: 0.12;
            transform: scale(0.5);
            filter: blur(4px);
        }

        .slider-container .swiper-slide-prev img,
        .slider-container .swiper-slide-next img {
            width: 50px;
            height: 50px;
        }

        .slider-container .swiper-slide:active {
            transform: scale(0.94);
            transition-duration: 0.05s;
        }

        /* ===== STATION NAME ===== */
        .station-name-display {
            flex-shrink: 0;
            text-align: center;
            padding: 6px 0 8px 0;
            min-height: 28px;
        }

        .station-name-display .track {
            font-size: 15px;
            font-weight: 600;
            opacity: 0.85;
            letter-spacing: 0.3px;
        }

        .station-name-display .artist {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 1px;
            letter-spacing: 0.5px;
        }

        /* ===== VINYL ===== */
        .vinyl-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 0 0 4px 0;
        }

        .vinyl {
            width: 280px;
            height: 280px;
            max-width: 68vw;
            max-height: 68vw;
            position: relative;
            border-radius: 50%;
            background: transparent;
            box-shadow: none;
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            background: transparent;
            overflow: hidden;
        }

        .vinyl-disc svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            padding: 2px 0 4px 0;
            margin-top: -6px;
            margin-bottom: 25px;
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            padding: 6px;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 0.95rem;
        }

        .btn:active {
            transform: scale(0.88);
            opacity: 0.5;
        }

        .btn-play {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            opacity: 1;
            padding: 0;
            font-size: 1.5rem;
        }

        .btn-play:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.92);
        }

        .btn-play.active {
            opacity: 1;
        }

        .btn-prev,
        .btn-next {
            font-size: 1.1rem;
        }

        /* ===== VOLUME ===== */
        .volume-wrapper {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.3;
            transition: opacity 0.4s ease;
        }

        .volume-wrapper:active,
        .volume-wrapper:focus-within {
            opacity: 0.7;
        }

        .volume-track {
            position: relative;
            width: 20px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .volume-track input {
            width: 120px;
            height: 2px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            transform: rotate(-90deg);
            transform-origin: center;
            position: absolute;
        }

        .volume-track input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .volume-track input::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 420px) {
            #app { padding: 16px 16px 16px; }
            .slider-container { height: 72px; margin: 20px 0 2px 0; }
            .slider-container .swiper-slide img { width: 44px; height: 44px; }
            .slider-container .swiper-slide-active img { width: 60px; height: 60px; }
            .slider-container .swiper-slide-prev img,
            .slider-container .swiper-slide-next img { width: 36px; height: 36px; }
            .station-name-display { padding: 4px 0 6px 0; }
            .station-name-display .track { font-size: 13px; }
            .station-name-display .artist { font-size: 11px; }
            .vinyl { width: 220px; height: 220px; max-width: 60vw; max-height: 60vw; }
            .controls { gap: 12px; padding: 0 0 2px 0; margin-top: -4px; margin-bottom: 20px; }
            .btn { width: 32px; height: 32px; padding: 4px; font-size: 0.8rem; }
            .btn-play { width: 50px; height: 50px; font-size: 1.2rem; }
            .btn-prev, .btn-next { font-size: 0.95rem; }
            .volume-wrapper { right: 16px; }
            .volume-track { height: 90px; }
            .volume-track input { width: 90px; }
        }

        @media (max-width: 360px) {
            .slider-container { height: 60px; margin: 16px 0 2px 0; }
            .slider-container .swiper-slide img { width: 36px; height: 36px; }
            .slider-container .swiper-slide-active img { width: 50px; height: 50px; }
            .slider-container .swiper-slide-prev img,
            .slider-container .swiper-slide-next img { width: 30px; height: 30px; }
            .station-name-display .track { font-size: 12px; }
            .station-name-display .artist { font-size: 10px; }
            .vinyl { width: 160px; height: 160px; max-width: 50vw; max-height: 50vw; }
            .controls { gap: 8px; margin-bottom: 16px; }
            .btn { width: 28px; height: 28px; font-size: 0.7rem; }
            .btn-play { width: 42px; height: 42px; font-size: 1rem; }
            .btn-prev, .btn-next { font-size: 0.8rem; }
            .volume-wrapper { right: 12px; }
            .volume-track { height: 70px; }
            .volume-track input { width: 70px; }
        }

        @supports (padding: max(0px)) {
            #app {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

                { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF', img: 'https://somafm.com/logos/400/sfinsf-400.jpg' },
                { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporwaves', station: 'SomaFM · Vaporwave', img: 'https://somafm.com/logos/400/vaporwaves-400.jpg' },
                { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal', img: 'https://somafm.com/logos/400/doomed-400.jpg' },
                { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House', img: 'https://somafm.com/logos/400/beatblender-400.jpg' },
                { value: 'https://ice1.somafm.com/bootliquor-128-mp3', track: 'Boot Liquor', station: 'SomaFM · Americana', img: 'https://somafm.com/logos/400/bootliquor-400.jpg' },
            ];

            const $ = (sel) => document.querySelector(sel);
            const app = $('#app');
            const vinylDisc = $('#vinylDisc');
            const playBtn = $('#playBtn');
            const playIcon = $('#playIcon');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const volumeSlider = $('#volumeSlider');
            const audio = $('#audioPlayer');
            const sliderWrapper = $('#sliderWrapper');
            const displayTrack = $('#displayTrack');
            const displayArtist = $('#displayArtist');

            let currentIndex = 0;
            let isPlaying = false;
            let swiper = null;
            let isSwitching = false;

            function buildSlider() {
                sliderWrapper.innerHTML = '';
                STATIONS.forEach((station, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.dataset.index = index;
                    
                    const img = document.createElement('img');
                    img.src = station.img;
                    img.alt = station.track;
                    img.loading = 'lazy';
                    
                    slide.appendChild(img);
                    sliderWrapper.appendChild(slide);
                });

                swiper = new Swiper('#stationSwiper', {
                    slidesPerView: 3,
                    centeredSlides: true,
                    loop: true,
                    speed: 500,
                    allowTouchMove: true,
                    watchSlidesProgress: true,
                    on: {
                        slideChange: function() {
                            const realIndex = this.realIndex;
                            if (realIndex !== currentIndex) {
                                switchToStation(realIndex);
                            }
                        }
                    }
                });

                document.querySelectorAll('.swiper-slide').forEach((slide) => {
                    slide.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        if (!isNaN(index) && swiper) {
                            swiper.slideToLoop(index);
                        }
                    });
                });
            }

            function updateBackground(index) {
                const colors = [
                    ['#3a1a3a', '#0a0a0a'], ['#1a0a1a', '#000000'],
                    ['#0a3a1a', '#0a0a0a'], ['#3a1a0a', '#0a0a0a'],
                    ['#2a1a3a', '#0a0a0a'], ['#1a2a3a', '#0a0a0a'],
                    ['#1a3a2a', '#0a0a0a'], ['#2a3a1a', '#0a0a0a'],
                    ['#1a1a1a', '#0a0a0a'], ['#0a0a2a', '#0a0a0a'],
                    ['#1a1a2a', '#0a0a0a'], ['#1a0a2a', '#0a0a0a'],
                    ['#2a0a0a', '#0a0a0a'], ['#2a0a3a', '#0a0a0a'],
                    ['#3a2a0a', '#0a0a0a'],
                ];
                const c = colors[index % colors.length];
                if (c) {
                    app.style.background = `radial-gradient(ellipse at 50% 30%, ${c[0]}, ${c[1]})`;
                }
            }

            function updateDisplay(index) {
                const station = STATIONS[index];
                if (station) {
                    displayTrack.textContent = station.track;
                    displayArtist.textContent = station.station;
                }
            }

            function switchToStation(index) {
                if (isSwitching) return;
                isSwitching = true;

                const station = STATIONS[index];
                if (!station) {
                    isSwitching = false;
                    return;
                }

                currentIndex = index;
                updateBackground(index);
                updateDisplay(index);

                audio.src = station.value;
                audio.load();

                if (isPlaying) {
                    audio.play()
                        .then(() => {
                            vinylDisc.style.animationPlayState = 'running';
                            isSwitching = false;
                        })
                        .catch((e) => {
                            console.warn('Play error:', e.message);
                            isPlaying = false;
                            updatePlayButton(false);
                            vinylDisc.style.animationPlayState = 'paused';
                            isSwitching = false;
                        });
                } else {
                    isSwitching = false;
                }
            }

            function togglePlay() {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                } else {
                    const station = STATIONS[currentIndex];
                    if (!station) return;

                    if (audio.src && audio.src === station.value) {
                        audio.play()
                            .then(() => {
                                isPlaying = true;
                                updatePlayButton(true);
                                vinylDisc.style.animationPlayState = 'running';
                            })
                            .catch((e) => {
                                console.warn('Play error:', e.message);
                            });
                    } else {
                        audio.src = station.value;
                        audio.load();
                        audio.play()
                            .then(() => {
                                isPlaying = true;
                                updatePlayButton(true);
                                vinylDisc.style.animationPlayState = 'running';
                            })
                            .catch((e) => {
                                console.warn('Play error:', e.message);
                                isPlaying = false;
                                updatePlayButton(false);
                                vinylDisc.style.animationPlayState = 'paused';
                            });
                    }
                }
            }

            function switchStation(direction) {
                if (!swiper) return;
                direction === 1 ? swiper.slideNext() : swiper.slidePrev();
            }

            function updatePlayButton(playing) {
                if (playing) {
                    playIcon.className = 'fas fa-pause';
                    playBtn.classList.add('active');
                } else {
                    playIcon.className = 'fas fa-play';
                    playBtn.classList.remove('active');
                }
            }

            function init() {
                buildSlider();
                updateBackground(0);
                updateDisplay(0);
                updatePlayButton(false);

                setTimeout(() => {
                    if (swiper) {
                        swiper.slideToLoop(0, 0);
                    }
                }, 100);

                playBtn.addEventListener('click', togglePlay);
                prevBtn.addEventListener('click', () => switchStation(-1));
                nextBtn.addEventListener('click', () => switchStation(1));

                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = parseFloat(e.target.value);
                });

                audio.addEventListener('error', () => {
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
