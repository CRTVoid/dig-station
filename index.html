<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <title>Radio Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding: 20px 20px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a2e, #0a0a0a);
            transition: background 1.8s ease;
            position: relative;
        }

        .slider-container {
            flex-shrink: 0;
            height: 80px;
            margin: 8px 0 16px;
            position: relative;
            overflow: hidden;
        }

        .slider-container .swiper {
            width: 100%;
            height: 100%;
        }

        .slider-container .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            opacity: 0.08;
            transform: scale(0.4);
            filter: blur(5px);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            background: transparent;
        }

        .slider-container .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            background: rgba(255,255,255,0.06);
            padding: 8px 24px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .slider-container .swiper-slide-prev,
        .slider-container .swiper-slide-next {
            opacity: 0.12;
            transform: scale(0.5);
            filter: blur(4px);
        }

        .slider-container .swiper-slide:active {
            transform: scale(0.94);
            transition-duration: 0.05s;
        }

        .vinyl-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 4px 0;
        }

        .vinyl {
            width: 280px;
            height: 280px;
            max-width: 68vw;
            max-height: 68vw;
            position: relative;
            border-radius: 50%;
            background: #121212;
            box-shadow: 0 0 80px rgba(255,255,255,0.02), inset 0 0 60px rgba(0,0,0,0.5);
        }

        .vinyl::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(
                from 0deg,
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.10),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.04),
                rgba(255,255,255,0.01)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 2s ease;
            animation: glowPulse 5s ease-in-out infinite;
            animation-play-state: paused;
            filter: blur(3px);
        }

        .vinyl.glow::before {
            opacity: 1;
            animation-play-state: running;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; transform: scale(1); }
            25% { opacity: 0.8; transform: scale(1.015); }
            50% { opacity: 0.3; transform: scale(0.99); }
            75% { opacity: 0.6; transform: scale(1.008); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #1a1a1a, #2d2d2d, #1a1a1a, #333333, #1a1a1a,
                #2d2d2d, #1a1a1a, #333333, #1a1a1a
            );
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        .vinyl-disc::after {
            content: '';
            position: absolute;
            inset: 6%;
            border-radius: 50%;
            background: radial-gradient(
                circle at 35% 35%,
                rgba(255,255,255,0.06) 0%,
                transparent 60%
            );
        }

        .vinyl-disc::before {
            content: '';
            position: absolute;
            inset: 14%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0%,
                transparent 3%,
                rgba(255,255,255,0.01) 3.5%,
                transparent 4%
            );
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14%;
            height: 14%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #666, #111 80%);
            border: 2px solid #222;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .vinyl-center::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: radial-gradient(circle, #888, #222);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            padding: 12px 0 6px;
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            padding: 10px;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.2rem;
        }

        .btn:active {
            transform: scale(0.88);
            opacity: 0.5;
        }

        .btn-play {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            opacity: 1;
            padding: 0;
            font-size: 1.5rem;
        }

        .btn-play:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.92);
        }

        .btn-play.active {
            opacity: 1;
        }

        .btn-stop {
            opacity: 0.2;
            width: 40px;
            height: 40px;
            font-size: 0.9rem;
        }

        .track-info {
            flex-shrink: 0;
            text-align: center;
            padding: 6px 0 2px;
            min-height: 52px;
        }

        .track-title {
            font-size: 16px;
            font-weight: 500;
            opacity: 0.85;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        .track-title.loading {
            opacity: 0.3;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .track-artist {
            font-size: 13px;
            opacity: 0.4;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .volume-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            display: flex;
            align-items: center;
            opacity: 0.2;
            transition: opacity 0.4s ease;
            padding: 12px 6px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .volume-container:active,
        .volume-container:focus-within {
            opacity: 0.6;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            transform: rotate(-90deg);
            transform-origin: center;
            position: absolute;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.15);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 420px) {
            #app { padding: 16px 16px 16px; }
            .slider-container { height: 64px; margin: 4px 0 12px; }
            .slider-container .swiper-slide { font-size: 13px; padding: 6px 12px; }
            .slider-container .swiper-slide-active { font-size: 17px; padding: 6px 18px; }
            .vinyl { width: 220px; height: 220px; max-width: 60vw; max-height: 60vw; }
            .btn { width: 40px; height: 40px; padding: 6px; font-size: 1rem; }
            .btn-play { width: 56px; height: 56px; font-size: 1.2rem; }
            .track-title { font-size: 14px; }
            .track-artist { font-size: 12px; }
            .volume-container { right: 6px; height: 120px; opacity: 0.12; }
            .volume-slider { width: 80px; }
        }

        @media (max-width: 360px) {
            .slider-container { height: 56px; }
            .slider-container .swiper-slide { font-size: 11px; padding: 4px 10px; }
            .slider-container .swiper-slide-active { font-size: 14px; padding: 4px 14px; }
            .vinyl { width: 160px; height: 160px; max-width: 50vw; max-height: 50vw; }
        }

        @supports (padding: max(0px)) {
            #app {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Слайдер Swiper -->
        <section class="slider-container">
            <div class="swiper" id="stationSwiper">
                <div class="swiper-wrapper" id="sliderWrapper"></div>
            </div>
        </section>

        <!-- Винил -->
        <section class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-disc" id="vinylDisc"></div>
                <div class="vinyl-center"></div>
            </div>
        </section>

        <!-- Транспорт -->
        <section class="controls">
            <button class="btn btn-prev" id="prevBtn" aria-label="Previous">
                <i class="fas fa-step-backward"></i>
            </button>
            <button class="btn btn-play" id="playBtn" aria-label="Play">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="btn btn-next" id="nextBtn" aria-label="Next">
                <i class="fas fa-step-forward"></i>
            </button>
            <button class="btn btn-stop" id="stopBtn" aria-label="Stop">
                <i class="fas fa-stop"></i>
            </button>
        </section>

        <!-- Информация о треке -->
        <footer class="track-info">
            <div class="track-title loading" id="trackTitle">Connecting</div>
            <div class="track-artist" id="trackArtist">Radio</div>
        </footer>

        <!-- Громкость -->
        <div class="volume-container">
            <input type="range" class="volume-slider" id="volumeSlider" 
                   min="0" max="1" step="0.05" value="0.7">
        </div>

        <audio id="audioPlayer" preload="none"></audio>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        (function() {
            'use strict';

            const STATIONS = [
                { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout' },
                { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient' },
                { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
                { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
                { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
                { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
                { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
                { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions' },
                { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio' },
                { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
                { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF' },
                { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporwaves', station: 'SomaFM · Vaporwave' },
                { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal' },
                { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House' },
            ];

            const $ = (sel) => document.querySelector(sel);
            const app = $('#app');
            const vinyl = $('#vinyl');
            const vinylDisc = $('#vinylDisc');
            const playBtn = $('#playBtn');
            const playIcon = $('#playIcon');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const stopBtn = $('#stopBtn');
            const trackTitle = $('#trackTitle');
            const trackArtist = $('#trackArtist');
            const volumeSlider = $('#volumeSlider');
            const audio = $('#audioPlayer');
            const sliderWrapper = $('#sliderWrapper');

            let currentIndex = 0;
            let isPlaying = false;
            let isStopped = false;
            let swiper = null;
            let isLoading = false; // флаг загрузки

            // ---------- ПОСТРОЕНИЕ СЛАЙДЕРА ----------
            function buildSlider() {
                sliderWrapper.innerHTML = '';
                STATIONS.forEach((station, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.textContent = station.track;
                    slide.dataset.index = index;
                    sliderWrapper.appendChild(slide);
                });

                swiper = new Swiper('#stationSwiper', {
                    slidesPerView: 3,
                    centeredSlides: true,
                    loop: true,
                    speed: 600,
                    allowTouchMove: true,
                    watchSlidesProgress: true,
                    on: {
                        slideChange: function() {
                            const realIndex = this.realIndex;
                            if (realIndex !== currentIndex) {
                                switchToStation(realIndex);
                            }
                        }
                    }
                });

                document.querySelectorAll('.swiper-slide').forEach((slide) => {
                    slide.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        if (!isNaN(index) && swiper) {
                            swiper.slideToLoop(index);
                        }
                    });
                });
            }

            // ---------- ФОН ----------
            function updateBackground(index) {
                const colors = [
                    ['#3a1a3a', '#0a0a0a'], ['#1a0a1a', '#000000'],
                    ['#0a3a1a', '#0a0a0a'], ['#3a1a0a', '#0a0a0a'],
                    ['#2a1a3a', '#0a0a0a'], ['#1a2a3a', '#0a0a0a'],
                    ['#1a3a2a', '#0a0a0a'], ['#2a3a1a', '#0a0a0a'],
                    ['#1a1a1a', '#0a0a0a'], ['#0a0a2a', '#0a0a0a'],
                    ['#1a1a2a', '#0a0a0a'], ['#1a0a2a', '#0a0a0a'],
                    ['#2a0a0a', '#0a0a0a'], ['#2a0a3a', '#0a0a0a'],
                ];
                const c = colors[index % colors.length];
                if (c) {
                    app.style.background = `radial-gradient(ellipse at 50% 30%, ${c[0]}, ${c[1]})`;
                }
            }

            // ---------- МЕРЦАНИЕ ----------
            function setVinylGlow(active) {
                vinyl.classList.toggle('glow', active);
            }

            // ---------- ЗАГРУЗКА СТАНЦИИ ----------
            function loadStation(index) {
                const station = STATIONS[index];
                if (!station) return;
                currentIndex = index;
                audio.src = station.value;
                audio.load();
                updateBackground(index);
                trackTitle.textContent = 'Loading...';
                trackTitle.className = 'track-title loading';
                trackArtist.textContent = station.station;
                isLoading = true;
            }

            // ---------- ВОСПРОИЗВЕДЕНИЕ С ОЖИДАНИЕМ ЗАГРУЗКИ ----------
            function playStation(index) {
                if (isLoading) return; // защита от повторных вызовов

                const station = STATIONS[index];
                if (!station) return;

                // Если уже играет та же станция — ничего не делаем
                if (audio.src === station.value && isPlaying) return;

                // Если это та же станция, но на паузе — просто играем
                if (audio.src === station.value && !isPlaying) {
                    audio.play().catch(() => {});
                    return;
                }

                // Новая станция
                loadStation(index);

                // Ждём, пока аудио загрузится
                const playAfterLoad = () => {
                    audio.removeEventListener('canplay', playAfterLoad);
                    audio.removeEventListener('loadedmetadata', playAfterLoad);
                    isLoading = false;
                    
                    audio.play()
                        .then(() => {
                            isPlaying = true;
                            updatePlayButton(true);
                            vinylDisc.style.animationPlayState = 'running';
                            setVinylGlow(true);
                            trackTitle.textContent = STATIONS[currentIndex].track;
                            trackTitle.className = 'track-title';
                            trackArtist.textContent = STATIONS[currentIndex].station;
                        })
                        .catch((e) => {
                            console.warn('Play error:', e.message);
                            trackTitle.textContent = 'Stream unavailable';
                            trackTitle.className = 'track-title loading';
                            isPlaying = false;
                            updatePlayButton(false);
                            vinylDisc.style.animationPlayState = 'paused';
                            setVinylGlow(false);
                            isLoading = false;
                        });
                };

                audio.addEventListener('canplay', playAfterLoad);
                audio.addEventListener('loadedmetadata', playAfterLoad);

                // Таймаут на случай, если поток не грузится
                setTimeout(() => {
                    if (isLoading) {
                        audio.removeEventListener('canplay', playAfterLoad);
                        audio.removeEventListener('loadedmetadata', playAfterLoad);
                        isLoading = false;
                        trackTitle.textContent = 'Stream timeout';
                        trackTitle.className = 'track-title loading';
                        isPlaying = false;
                        updatePlayButton(false);
                        vinylDisc.style.animationPlayState = 'paused';
                        setVinylGlow(false);
                    }
                }, 15000);
            }

            // ---------- ПЕРЕКЛЮЧЕНИЕ СТАНЦИИ (вызывается из Swiper) ----------
            function switchToStation(index) {
                if (index === currentIndex && isPlaying) return;
                
                const wasPlaying = isPlaying;
                
                // Останавливаем текущее воспроизведение
                if (wasPlaying) {
                    audio.pause();
                    setVinylGlow(false);
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                }
                
                // Загружаем и играем новую станцию
                if (wasPlaying) {
                    playStation(index);
                } else {
                    // Просто загружаем, но не играем
                    loadStation(index);
                    trackTitle.textContent = 'Stopped';
                    trackTitle.className = 'track-title';
                    trackArtist.textContent = STATIONS[index].station;
                }
            }

            // ---------- PLAY/PAUSE ----------
            function togglePlay() {
                if (isPlaying) {
                    pause();
                } else {
                    // Если есть src — играем
                    if (audio.src) {
                        playStation(currentIndex);
                    } else {
                        playStation(0);
                    }
                }
            }

            function pause() {
                audio.pause();
                isPlaying = false;
                updatePlayButton(false);
                vinylDisc.style.animationPlayState = 'paused';
                setVinylGlow(false);
                // Останавливаем таймаут загрузки, если был
                isLoading = false;
            }

            function stop() {
                pause();
                audio.currentTime = 0;
                isStopped = true;
                trackTitle.textContent = 'Stopped';
                trackTitle.className = 'track-title';
                trackArtist.textContent = STATIONS[currentIndex].station;
                // Не удаляем src, чтобы можно было перезапустить
            }

            // ---------- КНОПКИ PREV/NEXT ----------
            function switchStation(direction) {
                if (!swiper) return;
                direction === 1 ? swiper.slideNext() : swiper.slidePrev();
            }

            // ---------- КНОПКА PLAY/PAUSE ----------
            function updatePlayButton(playing) {
                if (playing) {
                    playIcon.className = 'fas fa-pause';
                    playBtn.classList.add('active');
                } else {
                    playIcon.className = 'fas fa-play';
                    playBtn.classList.remove('active');
                }
            }

            // ---------- ИНИЦИАЛИЗАЦИЯ ----------
            function init() {
                buildSlider();
                loadStation(0);
                updatePlayButton(false);

                setTimeout(() => {
                    if (swiper) {
                        swiper.slideToLoop(0, 0);
                    }
                }, 100);

                playBtn.addEventListener('click', togglePlay);
                prevBtn.addEventListener('click', () => switchStation(-1));
                nextBtn.addEventListener('click', () => switchStation(1));
                stopBtn.addEventListener('click', stop);

                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = parseFloat(e.target.value);
                });

                audio.addEventListener('error', () => {
                    trackTitle.textContent = 'Stream Error';
                    trackTitle.className = 'track-title loading';
                    isPlaying = false;
                    isLoading = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                    setVinylGlow(false);
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
