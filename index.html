<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <title>Radio Player</title>
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding: 20px 20px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a2e, #0a0a0a);
            transition: background 1.8s ease;
            position: relative;
        }

        /* ===== SLIDER (Swiper) ===== */
        .slider-container {
            flex-shrink: 0;
            height: 80px;
            margin: 8px 0 16px;
            position: relative;
            overflow: hidden;
        }

        .slider-container .swiper {
            width: 100%;
            height: 100%;
        }

        .slider-container .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            opacity: 0.1;
            transform: scale(0.5);
            filter: blur(4px);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            background: transparent;
        }

        .slider-container .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            background: rgba(255,255,255,0.06);
            padding: 8px 24px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .slider-container .swiper-slide-prev,
        .slider-container .swiper-slide-next {
            opacity: 0.15;
            transform: scale(0.55);
            filter: blur(3px);
        }

        .slider-container .swiper-slide:active {
            transform: scale(0.94);
            transition-duration: 0.05s;
        }

        /* ===== VINYL ===== */
        .vinyl-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 4px 0;
        }

        .vinyl {
            width: 280px;
            height: 280px;
            max-width: 68vw;
            max-height: 68vw;
            position: relative;
            border-radius: 50%;
            background: #121212;
            box-shadow: 0 0 80px rgba(255,255,255,0.02), inset 0 0 60px rgba(0,0,0,0.5);
        }

        /* ===== МЕРЦАНИЕ ===== */
        .vinyl::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(
                from 0deg,
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.10),
                rgba(255,255,255,0.01),
                rgba(255,255,255,0.04),
                rgba(255,255,255,0.01)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 2s ease;
            animation: glowPulse 5s ease-in-out infinite;
            animation-play-state: paused;
            filter: blur(3px);
        }

        .vinyl.glow::before {
            opacity: 1;
            animation-play-state: running;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; transform: scale(1); }
            25% { opacity: 0.8; transform: scale(1.015); }
            50% { opacity: 0.3; transform: scale(0.99); }
            75% { opacity: 0.6; transform: scale(1.008); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #1a1a1a, #2d2d2d, #1a1a1a, #333333, #1a1a1a,
                #2d2d2d, #1a1a1a, #333333, #1a1a1a
            );
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        .vinyl-disc::after {
            content: '';
            position: absolute;
            inset: 6%;
            border-radius: 50%;
            background: radial-gradient(
                circle at 35% 35%,
                rgba(255,255,255,0.06) 0%,
                transparent 60%
            );
        }

        .vinyl-disc::before {
            content: '';
            position: absolute;
            inset: 14%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0%,
                transparent 3%,
                rgba(255,255,255,0.01) 3.5%,
                transparent 4%
            );
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14%;
            height: 14%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #666, #111 80%);
            border: 2px solid #222;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .vinyl-center::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: radial-gradient(circle, #888, #222);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            padding: 12px 0 6px;
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            padding: 10px;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            border-radius: 50%;
            width: 48px;
            height: 48px;
        }

        .btn:active {
            transform: scale(0.88);
            opacity: 0.5;
        }

        .btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .btn-play {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            opacity: 1;
            padding: 0;
        }

        .btn-play svg {
            width: 28px;
            height: 28px;
        }

        .btn-play:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.92);
        }

        .btn-play.active {
            opacity: 1;
        }

        .btn-stop {
            opacity: 0.2;
            width: 40px;
            height: 40px;
        }

        .btn-stop svg {
            width: 16px;
            height: 16px;
        }

        /* ===== TRACK INFO ===== */
        .track-info {
            flex-shrink: 0;
            text-align: center;
            padding: 6px 0 2px;
            min-height: 52px;
        }

        .track-title {
            font-size: 16px;
            font-weight: 500;
            opacity: 0.85;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        .track-title.loading {
            opacity: 0.3;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .track-artist {
            font-size: 13px;
            opacity: 0.4;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* ===== VOLUME ===== */
        .volume-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            display: flex;
            align-items: center;
            opacity: 0.2;
            transition: opacity 0.4s ease;
            padding: 12px 6px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .volume-container:active,
        .volume-container:focus-within {
            opacity: 0.6;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            transform: rotate(-90deg);
            transform-origin: center;
            position: absolute;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.15);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            #app { padding: 16px 16px 16px; }
            .slider-container { height: 64px; margin: 4px 0 12px; }
            .slider-container .swiper-slide { font-size: 13px; padding: 6px 12px; }
            .slider-container .swiper-slide-active { font-size: 17px; padding: 6px 18px; }
            .vinyl { width: 220px; height: 220px; max-width: 60vw; max-height: 60vw; }
            .btn { width: 40px; height: 40px; padding: 6px; }
            .btn-play { width: 56px; height: 56px; }
            .btn-play svg { width: 24px; height: 24px; }
            .track-title { font-size: 14px; }
            .track-artist { font-size: 12px; }
            .volume-container { right: 6px; height: 120px; opacity: 0.12; }
            .volume-slider { width: 80px; }
        }

        @media (max-width: 360px) {
            .slider-container { height: 56px; }
            .slider-container .swiper-slide { font-size: 11px; padding: 4px 10px; }
            .slider-container .swiper-slide-active { font-size: 14px; padding: 4px 14px; }
            .vinyl { width: 160px; height: 160px; max-width: 50vw; max-height: 50vw; }
        }

        @supports (padding: max(0px)) {
            #app {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Слайдер Swiper -->
        <section class="slider-container">
            <div class="swiper" id="stationSwiper">
                <div class="swiper-wrapper" id="sliderWrapper"></div>
            </div>
        </section>

        <!-- Винил -->
        <section class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-disc" id="vinylDisc"></div>
                <div class="vinyl-center"></div>
            </div>
        </section>

        <!-- Транспорт -->
        <section class="controls">
            <button class="btn btn-prev" id="prevBtn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><polygon points="18,4 8,12 18,20"/><rect x="4" y="4" width="2" height="16"/></svg>
            </button>
            <button class="btn btn-play" id="playBtn" aria-label="Play">
                <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button class="btn btn-next" id="nextBtn" aria-label="Next">
                <svg viewBox="0 0 24 24"><polygon points="6,4 16,12 6,20"/><rect x="18" y="4" width="2" height="16"/></svg>
            </button>
            <button class="btn btn-stop" id="stopBtn" aria-label="Stop">
                <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg>
            </button>
        </section>

        <!-- Информация о треке -->
        <footer class="track-info">
            <div class="track-title loading" id="trackTitle">Connecting</div>
            <div class="track-artist" id="trackArtist">Radio</div>
        </footer>

        <!-- Громкость -->
        <div class="volume-container">
            <input type="range" class="volume-slider" id="volumeSlider" 
                   min="0" max="1" step="0.01" value="0.8">
        </div>

        <audio id="audioPlayer" preload="none"></audio>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        (function() {
            'use strict';

            // Только проверенные рабочие потоки
            const STATIONS = [
                { id: 'groovesalad',     name: 'Groove Salad',     stream: 'https://ice1.somafm.com/groovesalad-128-mp3',     colors: ['#3a1a3a', '#0a0a0a'] },
                { id: 'spacestation',    name: 'Space Station',    stream: 'https://ice1.somafm.com/spacestation-128-mp3',   colors: ['#0a1a3a', '#0a0a0a'] },
                { id: 'darkzone',        name: 'Dark Zone',        stream: 'https://ice1.somafm.com/darkzone-128-mp3',       colors: ['#1a0a1a', '#000000'] },
                { id: 'metaldetector',   name: 'Metal Detector',   stream: 'https://ice1.somafm.com/metaldetector-128-mp3',  colors: ['#3a1a0a', '#0a0a0a'] },
                { id: 'defcon',          name: 'DEF CON Radio',    stream: 'https://ice1.somafm.com/defcon-128-mp3',         colors: ['#0a3a1a', '#0a0a0a'] },
                { id: 'underground80s',  name: 'Underground 80s',  stream: 'https://ice1.somafm.com/underground80s-128-mp3', colors: ['#2a1a3a', '#0a0a0a'] },
                { id: 'bootliquor',      name: 'Boot Liquor',      stream: 'https://ice1.somafm.com/bootliquor-128-mp3',     colors: ['#3a2a0a', '#0a0a0a'] },
                { id: 'sevensoul',       name: 'Seven Inch Soul',  stream: 'https://ice1.somafm.com/sevensoul-128-mp3',      colors: ['#1a2a3a', '#0a0a0a'] },
                { id: 'fluid',           name: 'Fluid',            stream: 'https://ice1.somafm.com/fluid-128-mp3',          colors: ['#0a2a2a', '#0a0a0a'] },
                { id: 'secretagent',     name: 'Secret Agent',     stream: 'https://ice1.somafm.com/secretagent-128-mp3',    colors: ['#0a1a4a', '#0a0a0a'] },
                { id: 'beatblender',     name: 'Beat Blender',     stream: 'https://ice1.somafm.com/beatblender-128-mp3',    colors: ['#2a0a3a', '#0a0a0a'] },
                { id: 'sf1033',          name: 'SF 10-33',         stream: 'https://ice1.somafm.com/sf1033-128-mp3',         colors: ['#1a1a1a', '#0a0a0a'] },
                { id: 'policescanner',   name: 'SF Police',        stream: 'https://ice1.somafm.com/policescanner-128-mp3',  colors: ['#0a0a2a', '#0a0a0a'] },
                { id: 'vaporwaves',      name: 'Vaporwaves',       stream: 'https://ice1.somafm.com/vaporwaves-128-mp3',     colors: ['#1a0a2a', '#0a0a0a'] },
                { id: 'n5md',            name: 'n5MD Radio',       stream: 'https://ice1.somafm.com/n5md-128-mp3',           colors: ['#0a1a2a', '#0a0a0a'] },
                { id: 'sfinsf',          name: 'SF in SF',         stream: 'https://ice1.somafm.com/sfinsf-128-mp3',         colors: ['#1a1a2a', '#0a0a0a'] }
            ];

            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const app = $('#app');
            const vinyl = $('#vinyl');
            const vinylDisc = $('#vinylDisc');
            const playBtn = $('#playBtn');
            const playIcon = $('#playIcon');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const stopBtn = $('#stopBtn');
            const trackTitle = $('#trackTitle');
            const trackArtist = $('#trackArtist');
            const volumeSlider = $('#volumeSlider');
            const audio = $('#audioPlayer');
            const sliderWrapper = $('#sliderWrapper');

            let currentIndex = 0;
            let isPlaying = false;
            let isStopped = false;
            let swiper = null;

            // ---------- ПОСТРОЕНИЕ СЛАЙДЕРА (Swiper) ----------
            function buildSlider() {
                sliderWrapper.innerHTML = '';
                STATIONS.forEach((station, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.textContent = station.name;
                    slide.dataset.index = index;
                    sliderWrapper.appendChild(slide);
                });

                // Инициализация Swiper
                swiper = new Swiper('#stationSwiper', {
                    slidesPerView: 3,
                    centeredSlides: true,
                    loop: true,
                    speed: 600,
                    allowTouchMove: true,
                    watchSlidesProgress: true,
                    on: {
                        slideChange: function() {
                            const realIndex = this.realIndex;
                            const station = STATIONS[realIndex];
                            if (station) {
                                currentIndex = realIndex;
                                loadStation(realIndex);
                            }
                        }
                    }
                });

                // При клике на слайд — переключаемся
                document.querySelectorAll('.swiper-slide').forEach((slide) => {
                    slide.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        if (!isNaN(index) && swiper) {
                            swiper.slideToLoop(index);
                        }
                    });
                });
            }

            // ---------- ФОН ----------
            function updateBackground(colors) {
                if (colors && colors.length >= 2) {
                    app.style.background = `
                        radial-gradient(ellipse at 50% 30%, ${colors[0]}, ${colors[1]})
                    `;
                }
            }

            // ---------- МЕРЦАНИЕ ВИНИЛА ----------
            function setVinylGlow(active) {
                if (active) {
                    vinyl.classList.add('glow');
                } else {
                    vinyl.classList.remove('glow');
                }
            }

            // ---------- АУДИО ----------
            function loadStation(index) {
                const station = STATIONS[index];
                if (!station) return;
                currentIndex = index;
                audio.src = station.stream;
                audio.load();
                updateBackground(station.colors);
                trackTitle.textContent = 'Loading...';
                trackTitle.className = 'track-title loading';
                trackArtist.textContent = station.name;
            }

            function play() {
                if (isStopped) {
                    audio.currentTime = 0;
                    isStopped = false;
                }
                audio.play()
                    .then(() => {
                        isPlaying = true;
                        updatePlayButton(true);
                        vinylDisc.style.animationPlayState = 'running';
                        setVinylGlow(true);
                        trackTitle.textContent = STATIONS[currentIndex].name;
                        trackTitle.className = 'track-title';
                        trackArtist.textContent = 'Now Playing';
                    })
                    .catch((e) => {
                        console.warn('Play error:', e.message);
                        trackTitle.textContent = 'Stream unavailable';
                        trackTitle.className = 'track-title loading';
                        isPlaying = false;
                        updatePlayButton(false);
                        vinylDisc.style.animationPlayState = 'paused';
                        setVinylGlow(false);
                    });
            }

            function pause() {
                audio.pause();
                isPlaying = false;
                updatePlayButton(false);
                vinylDisc.style.animationPlayState = 'paused';
                setVinylGlow(false);
            }

            function stop() {
                pause();
                audio.currentTime = 0;
                isStopped = true;
                trackTitle.textContent = 'Stopped';
                trackTitle.className = 'track-title';
                trackArtist.textContent = STATIONS[currentIndex].name;
            }

            function togglePlay() {
                if (isPlaying) {
                    pause();
                } else {
                    play();
                }
            }

            function switchStation(direction) {
                if (!swiper) return;
                if (direction === 1) {
                    swiper.slideNext();
                } else {
                    swiper.slidePrev();
                }
            }

            // ---------- КНОПКА PLAY/PAUSE ----------
            function updatePlayButton(playing) {
                if (playing) {
                    playIcon.innerHTML = '<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
                    playBtn.classList.add('active');
                } else {
                    playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                    playBtn.classList.remove('active');
                }
            }

            // ---------- ИНИЦИАЛИЗАЦИЯ ----------
            function init() {
                buildSlider();
                loadStation(0);
                updatePlayButton(false);

                // Ждём, пока Swiper инициализируется
                setTimeout(() => {
                    if (swiper) {
                        swiper.slideToLoop(0, 0);
                    }
                }, 100);

                playBtn.addEventListener('click', togglePlay);
                prevBtn.addEventListener('click', () => switchStation(-1));
                nextBtn.addEventListener('click', () => switchStation(1));
                stopBtn.addEventListener('click', stop);

                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = parseFloat(e.target.value);
                });

                audio.addEventListener('error', () => {
                    trackTitle.textContent = 'Stream Error';
                    trackTitle.className = 'track-title loading';
                    isPlaying = false;
                    updatePlayButton(false);
                    vinylDisc.style.animationPlayState = 'paused';
                    setVinylGlow(false);
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
